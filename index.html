<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация на кружок</title>
</head>
<body>

    <h2>Регистрация на кружок по веб-дизайну</h2>

    <form action="#" method="post">
        
        <!-- 1. Текстовое поле Имя -->
        <label for="name">Ваше имя:</label><br>
        <input type="text" id="name" name="username" required><br><br>

        <!-- 2. Поле Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="useremail" required><br><br>

        <!-- 3. Выпадающий список Возраст -->
        <label for="age">Возрастная группа:</label><br>
        <select id="age" name="age_group">
            <option value="10-12">10-12 лет</option>
            <option value="13-15">13-15 лет</option>
            <option value="16+">16+ лет</option>
        </select><br><br>

        <!-- 4. Кнопка отправки -->
        <input type="submit" value="Записаться на кружок">

    </form>

</body>
</html>
