<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расписание на пятницу</title>
</head>
<body>

    <h2>Расписание на пятницу</h2>

    <table border="1">
        <thead>
            <tr>
                <th>№ урока</th>
                <th>Время</th>
                <th>Название предмета</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>8:30 – 9:15</td>
                <td>Математика</td>
            </tr>
            <tr>
                <td>2</td>
                <td>9:25 – 10:10</td>
                <td>Русский язык</td>
            </tr>
            <tr>
                <td>3</td>
                <td>10:20 – 11:05</td>
                <td>Информатика</td>
            </tr>
            <tr>
                <td>4</td>
                <td>11:15 – 12:00</td>
                <td>Физическая культура</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Конец занятий в 12:00</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
